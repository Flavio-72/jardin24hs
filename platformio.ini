; PlatformIO Project Configuration File
; Microclima V2.0 — ESP32-S3 (Waveshare ESP32-S3-Touch-LCD-2)
;
; La pantalla integrada ST7789 NO se usa (no funciona).
; Usamos una OLED SSD1306 1.3" externa por I2C.

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs

; La Waveshare usa flash de 16MB y PSRAM de 8MB
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB

; USB CDC para Serial por el puerto USB nativo
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM

lib_deps =
    ; Sensores
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/RTClib@^2.1.4

    ; OLED 1.3" SSD1306 (128x64, I2C)
    olikraus/U8g2@^2.35.19

    ; Servidor Web Async
    mathieucarbou/ESPAsyncWebServer@^3.6.0

    ; JSON
    bblanchon/ArduinoJson@^7.3.0

